<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Counter</title>

    <style>
        button{
            cursor: pointer;
            border: none;
            border-radius: 5px;
            height: 50px;
            width: 50px;
        }
        #increase{
            background-color: rgb(223, 133, 188);
        }
        #decrease{
            background-color: rgb(136, 209, 156);
        }
        #reset{
            background-color: red;
        }
    </style>

</head>
<body>

    <p id="demo"></p>

    <button id="increase">+</button>
    <button id="decrease">-</button>
    <button id="reset">Reset</button>
    
    <script src="sctipt.js"></script>
</body>
</html>
